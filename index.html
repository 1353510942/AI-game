<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>AI历史人物游戏</title>
</head>

<body>

<h1>AI历史人物猜谜</h1>

<div>
<button onclick="setDiff('easy')">简单</button>
<button onclick="setDiff('hard')">困难</button>
<button onclick="setDiff('hell')">地狱</button>
</div>

<hr>

<div id="log" style="white-space:pre-line;border:1px solid #ccc;padding:10px;height:400px;overflow:auto;"></div>

<br>

<input id="q" placeholder="提问">
<button onclick="askQuestion(document.getElementById('q').value)">提问</button>

<br><br>

<button onclick="getHint()">提示</button>
<button onclick="endGame()">放弃/结算</button>

<script src="game.js"></script>

<script>
function setDiff(d){
    state.difficulty = d;
    document.getElementById("log").innerHTML += "\n🎮难度：" + d + "\n";
}
</script>

</body>
</html>
