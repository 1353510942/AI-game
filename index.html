<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 AI历史人物猜谜游戏</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 6px;
            color: #e0c97f;
            text-align: center;
        }

        #totalScoreDisplay {
            font-size: 0.9rem;
            color: #a0c4ff;
            margin-bottom: 20px;
            min-height: 20px;
            text-align: center;
        }

        .box {
            background: #16213e;
            border: 1px solid #0f3460;
            border-radius: 12px;
            padding: 28px;
            width: 100%;
            max-width: 600px;
            margin-bottom: 16px;
        }

        .box h2 {
            color: #e0c97f;
            margin-bottom: 16px;
            font-size: 1.2rem;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px 14px;
            border-radius: 8px;
            border: 1px solid #0f3460;
            background: #0f3460;
            color: #e0e0e0;
            font-size: 1rem;
            margin-bottom: 10px;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: #e0c97f;
        }

        button {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: bold;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.85; }

        .btn-primary  { background: #e0c97f; color: #1a1a2e; }
        .btn-easy     { background: #4caf50; color: #fff; margin: 4px; }
        .btn-hard     { background: #ff9800; color: #fff; margin: 4px; }
        .btn-hell     { background: #f44336; color: #fff; margin: 4px; }
        .btn-hint     { background: #7c4dff; color: #fff; margin: 4px; }
        .btn-giveup   { background: #607d8b; color: #fff; margin: 4px; }
        .btn-continue { background: #4caf50; color: #fff; margin: 4px; }
        .btn-change   { background: #2196f3; color: #fff; margin: 4px; }

        .difficulty-desc {
            font-size: 0.82rem;
            color: #90a4ae;
            margin: 2px 4px 10px 4px;
            line-height: 1.5;
        }

        #chat {
            background: #0f1e3d;
            border-radius: 8px;
            padding: 14px;
            height: 340px;
            overflow-y: auto;
            font-size: 0.93rem;
            line-height: 1.7;
            margin-bottom: 14px;
            border: 1px solid #0f3460;
            word-break: break-all;
        }

        #chat div { margin: 3px 0; }

        .input-row {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }

        .input-row input {
            flex: 1;
            margin-bottom: 0;
        }

        .action-row {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-top: 4px;
        }

        #gameStatus {
            font-size: 0.85rem;
            color: #90a4ae;
            margin-bottom: 8px;
        }

        #welcomeText {
            font-size: 0.9rem;
            color: #a0c4ff;
            margin-bottom: 4px;
            text-align: center;
        }

        .tag-easy { color: #4caf50; font-weight: bold; }
        .tag-hard { color: #ff9800; font-weight: bold; }
        .tag-hell { color: #f44336; font-weight: bold; }

        /* 滚动条美化 */
        #chat::-webkit-scrollbar { width: 6px; }
        #chat::-webkit-scrollbar-track { background: #0f1e3d; }
        #chat::-webkit-scrollbar-thumb { background: #0f3460; border-radius: 3px; }
    </style>
</head>
<body>

    <h1>🎮 AI 历史人物猜谜</h1>
    <div id="welcomeText"></div>
    <div id="totalScoreDisplay"></div>

    <!-- ==================== 登录区 ==================== -->
    <div id="loginBox" class="box">
        <h2>👤 请输入你的用户名</h2>
        <input type="text" id="username" placeholder="输入用户名后按回车或点击开始" maxlength="20" />
        <button class="btn-primary" onclick="login()">开始游戏</button>
    </div>

    <!-- ==================== 难度选择区 ==================== -->
    <div id="difficultyBox" class="box" style="display:none;">
        <h2>🎯 选择难度</h2>

        <button class="btn-easy" onclick="startGame('easy')">😊 简单</button>
        <div class="difficulty-desc">
            人物来自中小学历史、语文、数学、物理等课本，或全球家喻户晓的历史名人。
        </div>

        <button class="btn-hard" onclick="startGame('hard')">😤 困难</button>
        <div class="difficulty-desc">
            大学课程或历史爱好者圈子中有一定知名度的人物，中小学课本中不常见。
        </div>

        <button class="btn-hell" onclick="startGame('hell')">💀 地狱</button>
        <div class="difficulty-desc">
            极度冷门，只有相关领域研究学者才熟悉的历史人物，全球各文明随机出题。
        </div>
    </div>

    <!-- ==================== 游戏区 ==================== -->
    <div id="gameBox" class="box" style="display:none;">
        <div id="gameStatus">游戏中...</div>

        <!-- 聊天记录 -->
        <div id="chat"></div>

        <!-- 提问行 -->
        <div class="input-row">
            <input type="text" id="question" placeholder="向AI提问（例如：这个人是中国人吗？）" maxlength="100" />
            <button class="btn-primary" onclick="ask()">提问</button>
        </div>

        <!-- 猜测行 -->
        <div class="input-row">
            <input type="text" id="guess" placeholder="输入你猜的人物名称" maxlength="50" />
            <button class="btn-primary" onclick="guess()">猜测</button>
        </div>

        <!-- 操作按钮行 -->
        <div class="action-row">
            <button class="btn-hint" onclick="hint()">💡 获取提示</button>
            <button class="btn-giveup" onclick="giveUp()">🏳️ 放弃本局</button>
        </div>

        <!-- 结算后按钮（默认隐藏） -->
        <div class="action-row" style="margin-top:10px;">
            <button id="continueBtn" class="btn-continue" onclick="continueGame()" style="display:none;">
                🔄 继续答题（同难度，分数累加）
            </button>
            <button id="changeDiffBtn" class="btn-change" onclick="changeDifficulty()" style="display:none;">
                🎯 换个难度
            </button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
