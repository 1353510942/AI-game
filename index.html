<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<title>AI历史人物猜谜游戏</title>

<style>
body { font-family: Arial; background:#f5f5f5; text-align:center; }
.container { width:700px; margin:auto; background:#fff; padding:20px; border-radius:10px; }
#chat { height:300px; overflow:auto; border:1px solid #ddd; padding:10px; text-align:left; }
button { margin:5px; padding:8px 12px; }
</style>
</head>

<body>

<div class="container">

<h2>🎮 AI历史人物猜谜游戏</h2>

<!-- 用户名 -->
<div id="loginBox">
  <input id="username" placeholder="输入用户名" />
  <button onclick="login()">进入游戏</button>
</div>

<!-- 游戏 -->
<div id="gameBox" style="display:none">

<p id="welcome"></p>

<select id="difficulty">
  <option value="easy">简单</option>
  <option value="hard">困难</option>
  <option value="hell">地狱</option>
</select>

<button onclick="startGame()">开始游戏</button>
<button onclick="giveUp()">放弃本局</button>
<button onclick="getHint()">提示</button>

<hr/>

<div id="chat"></div>

<input id="question" placeholder="输入问题或猜人物" />
<button onclick="ask()">提问</button>

</div>

</div>

<script src="game.js"></script>

</body>
</html>
