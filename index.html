<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI历史人物猜谜</title>
</head>

<body>

<h2>AI历史人物猜谜</h2>

<input id="name" placeholder="输入用户名">
<button onclick="setName()">进入</button>

<hr>

<h3>选择难度</h3>

<button onclick="setDifficulty('easy')">简单</button>
<button onclick="setDifficulty('hard')">困难</button>
<button onclick="setDifficulty('hell')">地狱</button>

<hr>

<input id="q" placeholder="提问">
<button onclick="ask(document.getElementById('q').value)">提问</button>

<br><br>

<button onclick="hint()">提示</button>

<br><br>

<input id="g" placeholder="猜测人物">
<button onclick="guess(document.getElementById('g').value)">猜测</button>

<br><br>

<button onclick="end()">结束结算</button>

<pre id="log"></pre>

<script src="game.js"></script>

</body>
</html>
