<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>AI历史人物猜谜游戏</title>

<style>
body{font-family:Arial;background:#f4f4f4;text-align:center}
.box{width:700px;margin:auto;background:#fff;padding:20px;border-radius:10px}
#chat{height:300px;overflow:auto;border:1px solid #ddd;padding:10px;text-align:left}
button{margin:5px;padding:8px}
</style>
</head>

<body>

<div class="box">

<h2>🎮 AI历史人物猜谜</h2>

<input id="username" placeholder="输入用户名">
<button onclick="login()">进入</button>

<div id="game" style="display:none">

<p id="welcome"></p>

<select id="mode">
<option value="easy">简单</option>
<option value="hard">困难</option>
<option value="hell">地狱</option>
</select>

<button onclick="startGame()">开始</button>
<button onclick="giveUp()">放弃</button>
<button onclick="hint()">提示</button>

<hr>

<div id="chat"></div>

<input id="input" placeholder="提问或猜测">
<button onclick="ask()">提交</button>

</div>

</div>

<script src="game.js"></script>
</body>
</html>
